<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo de Adivinhação s2</title>
</head>
<body>
    <script>
        alert("Jogo de Adivinhação :)");

        let numSecreto = Math.floor(Math.random() * 99) + 1; 
        let totalDeTentativas = 10; 

        for (let rodada = 1; rodada <= totalDeTentativas; rodada++) {
            alert(`Tentativa ${rodada} de ${totalDeTentativas}`);
            let chuteStr = prompt("Digite um número de 1 á 100: ");

            let chute = parseInt(chuteStr);

            if (chute < 1 || chute > 100) {
                alert("Você deve digitar um número válido entre 1 e 100!");
                continue;
            }

            if (chute === numSecreto) {
                alert("Você acertouuuuu!!! :)");
                break;
            } else {
                if (chute > numSecreto) {
                    alert("O seu chute foi maior que o número secreto :(");
                } else {
                    alert("O seu chute foi menor que o número secreto :(");
                }
            }
        }

        alert("Fim do jogo <3");

    </script>
</body>
</html>
